<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Bonds -->
  <line x1="100" y1="80" x2="140" y2="40" stroke="#333" stroke-width="3"/>
  <line x1="100" y1="80" x2="60" y2="40" stroke="#333" stroke-width="3"/>
  
  <!-- Oxygen atom -->
  <circle cx="100" cy="80" r="20" fill="#FF6B6B"/>
  <text x="100" y="85" text-anchor="middle" fill="white" font-weight="bold" font-size="14">O</text>
  <text x="115" y="65" fill="#FF6B6B" font-weight="bold" font-size="10">δ⁻</text>
  
  <!-- Hydrogen atoms -->
  <circle cx="140" cy="40" r="15" fill="#4ECDC4"/>
  <text x="140" y="45" text-anchor="middle" fill="white" font-weight="bold" font-size="12">H</text>
  <text x="150" y="30" fill="#4ECDC4" font-weight="bold" font-size="10">δ⁺</text>
  
  <circle cx="60" cy="40" r="15" fill="#4ECDC4"/>
  <text x="60" y="45" text-anchor="middle" fill="white" font-weight="bold" font-size="12">H</text>
  <text x="50" y="30" fill="#4ECDC4" font-weight="bold" font-size="10">δ⁺</text>
  
  <!-- Dipole moments -->
  <line x1="110" y1="70" x2="130" y2="50" stroke="red" stroke-width="2"/>
  <polygon points="130,50 125,47 125,53" fill="red"/>
  
  <line x1="90" y1="70" x2="70" y2="50" stroke="red" stroke-width="2"/>
  <polygon points="70,50 75,47 75,53" fill="red"/>
  
  <!-- Net dipole moment -->
  <line x1="100" y1="90" x2="100" y2="120" stroke="blue" stroke-width="2"/>
  <polygon points="100,120 95,115 105,115" fill="blue"/>
  
  <!-- Labels -->
  <text x="135" y="60" fill="red" font-size="10" text-anchor="middle">μ₁</text>
  <text x="65" y="60" fill="red" font-size="10" text-anchor="middle">μ₂</text>
  <text x="110" y="110" fill="blue" font-size="10" text-anchor="middle">μ_net</text>
  
  <!-- Angle indicator -->
  <path d="M 60 40 A 30 30 0 0 1 100 70" fill="none" stroke="gray" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 140 40 A 30 30 0 0 0 100 70" fill="none" stroke="gray" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="65" fill="gray" font-size="8" text-anchor="middle">104.5°</text>
</svg>